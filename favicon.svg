<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <circle cx="50" cy="50" r="48" fill="#050505" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- Золотая аура -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3">
  </circle>
  
  <!-- Буква G -->
  <text x="50" y="62" font-family="Georgia, serif" font-size="48" font-weight="bold" 
        fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">G</text>
  
</svg>